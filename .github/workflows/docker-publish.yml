name: Docker Publish Template

on:
  workflow_call:
    inputs:
      image-suffix:
        description: "Image name suffix appended to github.repository (e.g. backend, video, webui)"
        required: true
        type: string
      context:
        description: "Docker build context path"
        required: true
        type: string
      dockerfile:
        description: "Path to Dockerfile"
        required: true
        type: string
      platforms:
        description: "Target platforms"
        required: false
        type: string
        default: "linux/amd64,linux/arm64"
      build-args:
        description: "Docker build-args (newline-separated key=value pairs)"
        required: false
        type: string
        default: ""
      tag-suffix:
        description: "Suffix appended to every generated tag (e.g. -nowhisper)"
        required: false
        type: string
        default: ""
      push:
        description: "Whether to push the image to the registry"
        required: true
        type: boolean

jobs:
  build-and-push:
    name: Build and push (${{ inputs.image-suffix }}${{ inputs.tag-suffix }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image name
        id: prep
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository }}/${{ inputs.image-suffix }}"
          echo "name=${IMAGE,,}" >> "$GITHUB_OUTPUT"
        env:
          REGISTRY: ghcr.io

      - name: Log in to the container registry
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.name }}
          flavor: |
            suffix=${{ inputs.tag-suffix }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=ref,event=branch,enable=${{ github.ref != 'refs/heads/master' }}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ inputs.push }}
          platforms: ${{ inputs.platforms }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
