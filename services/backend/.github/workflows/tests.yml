name: Run Tests

on:
  push:
  pull_request:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build solution
      run: dotnet build --no-restore --configuration Release
      
    - name: Run Unit Tests
      run: dotnet test tests/MathLLMBackend.Tests/MathLLMBackend.Tests.csproj --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory:"${{ runner.temp }}/test-results" --logger:"trx;LogFileName=unit-tests.trx" --no-restore
      
    - name: Run Integration Tests
      run: dotnet test tests/MathLLMBackend.IntegrationTests/MathLLMBackend.IntegrationTests.csproj --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory:"${{ runner.temp }}/test-results" --logger:"trx;LogFileName=integration-tests.trx" --no-restore
      
    - name: List test results files
      if: always()
      run: |
        echo "Listing test results directory:"
        find "${{ runner.temp }}/test-results" -type f -name "*.trx" || echo "No .trx files found"
        find "${{ runner.temp }}/test-results" -type f || echo "No files found in test-results"
      
    - name: Publish Test Results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        trx_files: |
          ${{ runner.temp }}/test-results/**/*.trx
        check_name: Test Results
        fail_on: 'test failures'
        commit: ${{ github.event.pull_request.head.sha || github.sha }}
      
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: ${{ runner.temp }}/test-results
        retention-days: 30
        
    - name: Upload code coverage
      uses: codecov/codecov-action@v4
      if: always()
      with:
        files: ${{ runner.temp }}/test-results/**/coverage.cobertura.xml
        fail_ci_if_error: false
